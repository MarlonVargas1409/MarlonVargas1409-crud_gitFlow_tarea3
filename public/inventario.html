<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Supermercado ITLA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; padding: 8px 15px; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-save { background: #27ae60; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-edit { background: #f39c12; color: white; margin-right: 5px; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-refresh { background: #3498db; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 id="form-title">➕ Gestionar Producto</h2>
        <form id="form-producto">
            <input type="hidden" id="producto-id"> 
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre" required placeholder="Nombre del producto">
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Categoría</label>
                    <select id="categoria">
                        <option value="Lácteos">Lácteos</option>
                        <option value="Cárnicos">Cárnicos</option>
                        <option value="Granos">Granos</option>
                        <option value="Bebidas">Bebidas</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Precio</label>
                    <input type="number" id="precio" min="1" required placeholder="0.00">
                </div>
                <div style="flex: 1;">
                    <label>Stock</label>
                    <input type="number" id="stock" min="0" required placeholder="0">
                </div>
            </div>
            <button type="submit" id="btn-submit" class="btn-save">Guardar Producto</button>
        </form>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between;">
            <h2>🛒 Inventario</h2>
            <button id="btn-refrescar" class="btn-refresh" onclick="cargarProductos()">🔄 Refrescar</button>
        </div>
        <table id="tabla-productos">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const form = document.getElementById('form-producto');
    const inputId = document.getElementById('producto-id');
    const btnSubmit = document.getElementById('btn-submit');
    const formTitle = document.getElementById('form-title');

    async function cargarProductos() {
        const res = await fetch('/api/products');
        const data = await res.json();
        const tbody = document.querySelector('#tabla-productos tbody');
        tbody.innerHTML = '';
        
        data.products.forEach((p, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.nombre}</td>
                    <td>${p.categoria}</td>
                    <td>RD$ ${p.precio}</td>
                    <td>${p.stock}</td>
                    <td>
                        <button id="btn-edit-${index}" class="btn-edit" onclick="prepararEdicion('${p._id}', '${p.nombre}', '${p.categoria}', ${p.precio}, ${p.stock})">Editar</button>
                        <button id="btn-delete-${index}" class="btn-delete" onclick="borrarProducto('${p._id}')">Borrar</button>
                    </td>
                </tr>`;
        });
    }

    async function borrarProducto(id) {
        if (!confirm('¿Seguro que quieres eliminar este producto?')) return;
        await fetch(`/api/products/${id}`, { method: 'DELETE' });
        cargarProductos();
    }

    function prepararEdicion(id, nombre, categoria, precio, stock) {
        inputId.value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('categoria').value = categoria;
        document.getElementById('precio').value = precio;
        document.getElementById('stock').value = stock;
        formTitle.innerText = "📝 Editar Producto";
        btnSubmit.innerText = "Actualizar Cambios";
        btnSubmit.style.background = "#f39c12";
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = inputId.value;
        const url = id ? `/api/products/${id}` : '/api/products';
        const method = id ? 'PUT' : 'POST';

        const datos = {
            nombre: document.getElementById('nombre').value,
            categoria: document.getElementById('categoria').value,
            precio: Number(document.getElementById('precio').value),
            stock: Number(document.getElementById('stock').value)
        };

        await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        });

        form.reset();
        inputId.value = '';
        formTitle.innerText = "➕ Gestionar Producto";
        btnSubmit.innerText = "Guardar Producto";
        btnSubmit.style.background = "#27ae60";
        cargarProductos();
    });

    cargarProductos();
</script>
</body>
</html>
